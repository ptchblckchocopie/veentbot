services:
  db:
    image: pgvector/pgvector:pg17
    container_name: veentbot-db
    environment:
      POSTGRES_USER: veentbot
      POSTGRES_PASSWORD: veentbot
      POSTGRES_DB: veentbot
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veentbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
