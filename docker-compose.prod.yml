services:
  # ── PostgreSQL + pgvector ──
  db:
    image: pgvector/pgvector:pg17
    container_name: veentbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: veentbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-veentbot_prod_2026}
      POSTGRES_DB: veentbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veentbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM + embeddings) ──
  ollama:
    image: ollama/ollama:latest
    container_name: veentbot-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Pull models on first run ──
  ollama-init:
    image: ollama/ollama:latest
    container_name: veentbot-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling embedding model...' &&
        ollama pull nomic-embed-text &&
        echo 'Pulling LLM model...' &&
        ollama pull qwen2.5:3b &&
        echo 'Models ready!'
      "

  # ── VeentBot ──
  bot:
    build: .
    container_name: veentbot-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://veentbot:${DB_PASSWORD:-veentbot_prod_2026}@db:5432/veentbot
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen2.5:3b
      COMPANY_NAME: ${COMPANY_NAME:-Veent Tix}
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  ollama_data:
