# Veent Tix FAQ Data
# Source: https://www.veent.io/ (scraped March 2026)
# This is the initial knowledge base for the Veent Tix chatbot.

faqs:
  # ============================================================
  # GENERAL / ABOUT
  # ============================================================

  - question: "What is Veent Tix?"
    answer: "Veent Tix is an online ticketing platform operated by Veent Apps Inc. It allows event organizers to create, promote, and sell tickets for concerts, festivals, workshops, fun runs, and other live events. Customers can easily browse upcoming events, purchase tickets through a secure payment system, and receive their tickets digitally via email or their Veent Tix account."
    category: "general"

  - question: "What does Veent Tix do?"
    answer: "Veent Tix is the ultimate platform for event organizers and attendees. Whether you're hosting concerts, conferences, or local gatherings, Veent Tix handles your tickets, attendees, and check-in process — so organizers can focus on delivering the experience. Customers can explore and book tickets to events seamlessly."
    category: "general"

  - question: "How does Veent Tix work?"
    answer: "Veent Tix operates as an intermediary that connects event organizers and ticket holders through a secure online ticketing system. Organizers create and manage event listings, set pricing, and distribute tickets electronically. Customers browse upcoming events, purchase digital tickets, and receive confirmations via email or their Veent Tix account. At the event, attendees present their digital ticket (QR code) or a printed copy for entry."
    category: "general"

  - question: "Who operates Veent Tix?"
    answer: "Veent Tix is operated and managed by Veent Apps Inc. The platform is based in the Philippines with jurisdiction in Cagayan de Oro City, Misamis Oriental."
    category: "general"

  - question: "Is Veent Tix the event organizer?"
    answer: "No. Veent Tix does not organize, operate, or manage the events listed on the platform unless explicitly stated otherwise. Veent's role is limited to providing the technological framework and payment infrastructure for ticket transactions. All responsibilities related to the event (content, scheduling, pricing, fulfillment) lie with the event organizer."
    category: "general"

  # ============================================================
  # FEATURES & SERVICES
  # ============================================================

  - question: "What features does Veent Tix offer for event organizers?"
    answer: "Veent Tix offers organizers: (1) Easy Event Setup — tools designed to transform your event management experience, (2) Advanced Ticketing — flexible ticket types, early bird pricing, and promotional codes, (3) Secure Payments — enterprise-grade security with industry-leading encryption, (4) Real-Time Analytics — track sales, attendance, and engagement metrics in real-time, and (5) Marketing Tools — integrated email campaigns, social sharing, and promotional features."
    category: "features"

  - question: "What types of events can I create on Veent Tix?"
    answer: "You can create various types of events including concerts, fun runs, festivals, conferences, workshops, private gatherings, and more. The contact form lists supported event types as: Concert, Fun Run, Festival, Conference, Workshop, Private Gathering, and Other."
    category: "features"

  - question: "Does Veent Tix have analytics or reporting?"
    answer: "Yes! Veent Tix offers Real-Time Analytics that let you make informed decisions with powerful insights. You can track sales, attendance, and engagement metrics in real-time through the platform dashboard."
    category: "features"

  - question: "Does Veent Tix have marketing tools?"
    answer: "Yes. Veent Tix includes integrated marketing tools to help you reach more attendees. This includes email campaigns, social sharing features, and promotional tools built right into the platform."
    category: "features"

  - question: "What ticketing options are available?"
    answer: "Veent Tix offers Advanced Ticketing with flexible ticket types, early bird pricing, and promotional codes. Organizers can set up multiple ticket tiers (e.g., VVIP, VIP, Platinum, Premium, Lower Balcony, Upper Balcony) with different price points. Some ticket types support seat selection."
    category: "features"

  # ============================================================
  # TICKETS & PURCHASING
  # ============================================================

  - question: "How do I buy tickets on Veent Tix?"
    answer: "To buy tickets, browse events on the Veent Tix website at www.veent.io/discover, select the event you're interested in, choose your ticket type and quantity, and complete your purchase through our secure payment system. You'll need a Veent Tix account to complete the purchase."
    category: "tickets"

  - question: "How will I receive my tickets after purchasing?"
    answer: "Once you've completed your purchase, your tickets will be delivered automatically to your registered email address and also accessible through your Veent Tix account under 'My Tickets.' You may present your digital ticket (QR code) at the event entrance, or if preferred, print a physical copy. Please ensure your email and account details are accurate before completing your order to avoid delivery issues."
    category: "tickets"

  - question: "What do I need to bring to the event?"
    answer: "You need to present a valid copy of your ticket, either printed or digital (QR code), at the event entrance. Admission may also require a government-issued photo identification card (ID) that matches the name on the ticket."
    category: "tickets"

  - question: "What if I lose my ticket?"
    answer: "You can access your tickets anytime through your Veent Tix account dashboard under 'My Tickets.' However, Veent is not responsible for lost, deleted, stolen, or damaged tickets once delivered. Make sure to keep your digital ticket accessible on your device or print a backup copy."
    category: "tickets"

  - question: "Are ticket sales final?"
    answer: "Yes. All ticket purchases made through Veent Tix are considered final, binding, and strictly non-refundable. Once a transaction has been completed and a confirmation has been issued, no refunds, reversals, or exchanges shall be granted."
    category: "tickets"

  # ============================================================
  # PAYMENTS
  # ============================================================

  - question: "What payment methods does Veent Tix accept?"
    answer: "Veent Tix accepts the following payment methods: Maya, Visa (credit/debit cards), GCash, and Bank Transfer. All payments are processed securely through trusted payment partners with enterprise-grade encryption."
    category: "payments"

  - question: "Is my payment information secure?"
    answer: "Yes. Veent Tix uses enterprise-grade security with industry-leading encryption to protect your payment data. The platform employs SSL encryption, firewalls, secure cloud hosting, role-based access controls, and regular system updates and audits to protect your data from unauthorized access."
    category: "payments"

  # ============================================================
  # REFUND POLICY
  # ============================================================

  - question: "Can I get a refund for my ticket?"
    answer: "All sales made through Veent Tix are final and non-refundable. We follow a strict No Refund Policy, which means once a ticket has been purchased, we cannot offer refunds, cancellations, or exchanges for any reason — including changes in your personal schedule, transportation issues, illness, dissatisfaction with the event, or weather conditions."
    category: "refund"

  - question: "Can I request a refund or exchange after purchasing a ticket?"
    answer: "All sales made through Veent Tix are final and non-refundable. We follow a strict No Refund Policy, which means once a ticket has been purchased, we cannot offer refunds, cancellations, or exchanges for any reason — including changes in your personal schedule, transportation issues, illness, dissatisfaction with the event, or weather conditions. However, in the rare case that an event is officially canceled by the organizer, any refund requests will be handled directly by the event organizer according to their own refund policy. Veent Tix is not responsible for processing refunds unless explicitly stated otherwise."
    category: "refund"

  - question: "What is Veent Tix's refund policy?"
    answer: "Veent Tix has a strict No Refund Policy. All ticket purchases are considered final, binding, and non-refundable. No refunds, reversals, or exchanges will be granted for any reason, including: personal schedule conflicts, travel delays, changes of mind, illness, dissatisfaction with the event, or unforeseen circumstances like weather disruptions. Veent Tix is a service intermediary — all proceeds (after fees) go directly to the organizer."
    category: "refund"

  # ============================================================
  # EVENT CHANGES & CANCELLATIONS
  # ============================================================

  - question: "What happens if an event is postponed or rescheduled?"
    answer: "If an event is postponed or rescheduled, your existing ticket will remain valid for the new date or venue. Veent Tix will send you an email notification once the organizer finalizes the updated details."
    category: "events"

  - question: "What happens if an event is canceled?"
    answer: "If an event is fully canceled, the event organizer is responsible for handling any refund requests or alternative solutions, such as event credits or rescheduled access. Veent Tix serves only as a ticketing service provider and does not control event decisions or refund timelines. Veent Tix shall not be held liable for refunds or damages resulting from event cancellations."
    category: "events"

  - question: "What happens if the event is postponed, rescheduled, or canceled?"
    answer: "If an event is postponed or rescheduled, your existing ticket will remain valid for the new date or venue. Veent Tix will send you an email notification once the organizer finalizes the updated details. If the event is fully canceled, the event organizer is responsible for handling any refund requests or alternative solutions, such as event credits or rescheduled access. Veent Tix serves only as a ticketing service provider and does not control event decisions or refund timelines."
    category: "events"

