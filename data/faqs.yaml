  # --- Buying Tickets (step-by-step) ---

  - question: "How do I buy a ticket?"
    answer: "To buy a ticket on Veent Tix, follow these steps: (1) Go to www.veent.io and click 'Explore Events' in the top navigation bar, or click 'Book Your Ticket' on the homepage — both take you to the Discover page at www.veent.io/discover. (2) Browse the list of upcoming events and click on the event you want to attend. (3) On the event page, scroll down to the 'Book Your Ticket Now' section. (4) Choose your ticket type (e.g., VVIP, VIP, General Admission) and select your quantity using the + and - buttons. For events with seat selection, click 'Select Seats' to choose specific seats. (5) Click 'Next' to proceed to checkout. (6) Log in or create a Veent Tix account if you haven't already. (7) Complete payment using Maya, Visa, GCash, or Bank Transfer. (8) Your digital ticket with a QR code will be sent to your email and available under 'My Tickets' in your account dashboard."
    category: "navigation"

  - question: "I want to book tickets for an event"
    answer: "To book tickets: (1) Visit www.veent.io and click 'Explore Events' in the top navigation bar, or click 'Book Your Ticket' on the homepage. (2) On the Discover page (www.veent.io/discover), find and click the event you'd like to attend. (3) On the event page, scroll down to 'Book Your Ticket Now.' (4) Select your ticket type and quantity, then click 'Next.' (5) Log in to your account (or create one at v2.veent.io/sign-in). (6) Complete payment via Maya, Visa, GCash, or Bank Transfer. Your ticket will be emailed to you and appear under 'My Tickets' in your dashboard."
    category: "navigation"

  - question: "Where do I click to purchase a ticket?"
    answer: "From any page on www.veent.io, click 'Explore Events' in the top navigation bar to go to the Discover page. Then click on the event you want. On the event page, scroll down to the 'Book Your Ticket Now' section, choose your ticket type and quantity, and click 'Next' to proceed to checkout. You can also click 'Book Your Ticket' on the homepage hero section to go straight to the Discover page."
    category: "navigation"

  # --- Finding / Browsing Events ---

  - question: "How do I find events on the website?"
    answer: "There are several ways to find events: (1) Click 'Explore Events' in the top navigation bar on any page — this takes you to www.veent.io/discover where all upcoming events are listed by date. (2) On the homepage (www.veent.io), scroll down to the 'Recommended Events' section to see featured upcoming events. Click 'Explore for more' to see all events. (3) Each event card shows the event name and date. Click on any event to see its full details, ticket options, and pricing."
    category: "navigation"

  - question: "Where can I browse all upcoming events?"
    answer: "Click 'Explore Events' in the top navigation bar on any page, or go directly to www.veent.io/discover. This page shows all upcoming events sorted by date (newest first). Each event card displays the event name and date. Events that have passed are marked 'ENDED.' Click 'See More Events' at the bottom to load older events."
    category: "navigation"

  - question: "I want to see what events are available"
    answer: "To see available events, click 'Explore Events' in the top navigation bar at the top of the page. This takes you to the Discover page (www.veent.io/discover) where all upcoming events are listed. You can also scroll down on the homepage to see 'Recommended Events.' Click any event to view its full details, including dates, venue, ticket types, and pricing."
    category: "navigation"

  # --- Logging In / Signing Up ---

  - question: "How do I log in to my account?"
    answer: "Click the 'LOGIN' button in the top-right corner of the navigation bar on any page. This takes you to the sign-in page at v2.veent.io/sign-in. You can sign in using 'Continue with Google' or enter your email and password. After signing in, you'll have access to your Dashboard and Wallet."
    category: "navigation"

  - question: "How do I sign up for an account?"
    answer: "Click the 'LOGIN' button in the top-right corner of the navigation bar, then on the sign-in page (v2.veent.io/sign-in), click the 'Sign up' link. Follow the registration process by providing your full name, email address, and other required details. You'll receive a confirmation email to verify your account."
    category: "navigation"

  - question: "Where is the login button?"
    answer: "The 'LOGIN' button is located in the top-right corner of the navigation bar. It appears on every page of the website. Clicking it takes you to v2.veent.io/sign-in where you can sign in with Google or your email and password, or sign up for a new account."
    category: "navigation"

  - question: "I want to create a Veent Tix account"
    answer: "To create an account: (1) Click the 'LOGIN' button in the top-right corner of the navigation bar on any page. (2) On the sign-in page (v2.veent.io/sign-in), click the 'Sign up' link. (3) Provide your full name, email address, and other required details. (4) Check your email for a verification link and confirm your account. Once verified, you can log in and start browsing events, purchasing tickets, and managing your dashboard."
    category: "navigation"

  # --- Viewing Tickets / Dashboard ---

  - question: "How do I view my tickets?"
    answer: "To view your purchased tickets: (1) Click 'LOGIN' in the top-right corner of the navigation bar and sign in to your account at v2.veent.io/sign-in. (2) Once logged in, go to your Dashboard. (3) Click on 'My Tickets' to see all your purchased tickets with their QR codes. You can show the QR code on your phone at the event entrance, or print a copy."
    category: "navigation"

  - question: "Where can I find my tickets after buying?"
    answer: "Your tickets are in two places: (1) Check your email — a digital ticket with a QR code is automatically sent to your registered email after purchase. (2) Log in to your Veent Tix account at v2.veent.io/sign-in, then navigate to your Dashboard and click 'My Tickets.' All your purchased tickets with QR codes are stored there."
    category: "navigation"

  - question: "How do I access my dashboard?"
    answer: "To access your dashboard: (1) Click the 'LOGIN' button in the top-right corner of the navigation bar. (2) Sign in at v2.veent.io/sign-in using your Google account or email and password. (3) After signing in, you'll be taken to your Dashboard where you can access 'My Tickets,' your Wallet, and account settings."
    category: "navigation"

  - question: "I want to check my wallet"
    answer: "To check your wallet: (1) Click the 'LOGIN' button in the top-right corner of the navigation bar. (2) Sign in to your account at v2.veent.io/sign-in. (3) Once logged in, your Wallet is accessible from your Dashboard. The wallet shows your balance and transaction history."
    category: "navigation"

  # --- Selecting Seats ---

  - question: "How do I select seats for an event?"
    answer: "Not all events have seat selection — it depends on the ticket type. To select seats: (1) Go to the event page by finding the event on the Discover page (www.veent.io/discover) and clicking on it. (2) Scroll down to 'Book Your Ticket Now.' (3) For ticket types that support seat selection (like VVIP or VIP), you'll see a 'Select Seats' button next to the ticket tier. Click it to open the seat map. (4) Choose your preferred seats from the available options. (5) Click 'Next' to proceed to checkout. For general admission tickets, there's no seat selection — just use the + and - buttons to choose your quantity."
    category: "navigation"

