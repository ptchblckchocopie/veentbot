  - question: "How does Veent Tix handle my personal data?"
    answer: "Veent Tix collects and processes personal data in compliance with the Philippine Data Privacy Act of 2012 and the guidelines of the National Privacy Commission (NPC). We collect information you provide (full name, email, contact number, payment info, event preferences) and non-personal data (browser type, device info, IP address). Your data is stored securely using encrypted databases with restricted access and is kept only as long as needed."
