  # --- Homepage Navigation ---

  - question: "What can I do on the Veent Tix homepage?"
    answer: "The homepage at www.veent.io gives you several options: (1) Click 'Book Your Ticket' to go to the Discover page and browse events. (2) Click 'Create Event' if you're an organizer who wants to host an event. (3) Scroll down to see 'Recommended Events' — click any event to view details, or click 'Explore for more.' (4) View features for organizers, partner organizations, and testimonials. (5) Check the FAQ section with expandable answers. (6) See accepted payment methods (Maya, Visa, GCash, Bank Transfer). (7) Use the footer for quick links, contact info, and social media."
    category: "navigation"

  - question: "What is on the navigation bar?"
    answer: "The top navigation bar appears on every page and has: (1) The Veent logo on the top left — click it to go back to the homepage at www.veent.io. (2) 'Explore Events' — click to browse all upcoming events on the Discover page (www.veent.io/discover). (3) 'Contacts' — click to go to the contact form for event organizers (www.veent.io/contacts). (4) 'LOGIN' — click to sign in or create an account at v2.veent.io/sign-in."
    category: "navigation"

  # --- QR Code ---

  - question: "How do I verify a QR code ticket?"
    answer: "On the event page, scroll to the bottom and look for the 'Verify QR Code' link. Click it to access the QR code verification tool. This lets you scan and verify whether a ticket's QR code is valid for that event."
    category: "navigation"

  # --- Payment Process ---

  - question: "How do I pay for my tickets?"
    answer: "After selecting your tickets on an event page and clicking 'Next,' you'll be taken to the checkout process. Choose your payment method from: Maya (digital wallet), Visa (credit/debit card), GCash (mobile wallet), or Bank Transfer (direct bank payment). Follow the prompts to complete payment. Once payment is confirmed, your digital ticket with QR code will be sent to your email and appear under 'My Tickets' in your account dashboard."
    category: "navigation"

  - question: "What payment methods can I use?"
    answer: "At checkout, you can pay using: (1) Maya — a digital wallet, (2) Visa — credit or debit card, (3) GCash — mobile wallet, or (4) Bank Transfer — direct bank payment. These options are shown at the bottom of the homepage and during checkout. All payments are processed securely through trusted payment partners."
    category: "navigation"

  # --- Going Back / General Navigation ---

  - question: "How do I go back to the homepage?"
    answer: "Click the Veent logo in the top-left corner of the navigation bar on any page. This always takes you back to the homepage at www.veent.io."
    category: "navigation"

  - question: "Where is the FAQ section on the website?"
    answer: "The FAQ section is on the homepage at www.veent.io. Scroll down past the Recommended Events, Features, Partners, and Testimonials sections. You'll see 5 frequently asked questions with expandable accordion-style answers. You can also click 'FAQ' in the footer Quick Links section — it scrolls you directly to the FAQ section on the homepage."
    category: "navigation"

  - question: "How do I find Veent Tix's social media from the website?"
    answer: "Scroll to the bottom of any page on www.veent.io and look in the footer. You'll find links to Veent Tix's social media accounts: Facebook (facebook.com/veent.io), Instagram (@veent.tix), LinkedIn (linkedin.com/company/veent), and TikTok (@veent_tix)."
    category: "navigation"

  # ============================================================
  # TAGALOG / TAGLISH FAQs
  # Common questions in Tagalog/Filipino (Taglish) — the way
  # Filipino users naturally ask. UI element names are kept in
  # English since those are what appear on the website.
  # ============================================================

  - question: "Ano ang Veent Tix?"
    answer: "Ang Veent Tix ay isang online ticketing platform na pinapatakbo ng Veent Apps Inc. Dito pwede kang mag-browse ng mga upcoming events tulad ng concerts, festivals, fun runs, at workshops, bumili ng tickets gamit ang secure na payment system, at matanggap ang digital ticket mo via email o sa iyong Veent Tix account. Para sa mga event organizers naman, may tools para gumawa, mag-promote, at magbenta ng tickets."
    category: "tagalog"

  - question: "Paano bumili ng ticket?"
    answer: "Sundan mo lang ang mga steps na ito: (1) Pumunta sa www.veent.io at i-click ang 'Explore Events' sa navigation bar sa taas, o i-click ang 'Book Your Ticket' sa homepage — dadalhin ka sa Discover page sa www.veent.io/discover. (2) Hanapin at i-click ang event na gusto mong puntahan. (3) Sa event page, mag-scroll pababa sa 'Book Your Ticket Now' section. (4) Piliin ang ticket type mo (hal. VVIP, VIP, General Admission) at i-set ang quantity gamit ang + at - buttons. Kung may seat selection, i-click ang 'Select Seats.' (5) I-click ang 'Next' para mag-proceed sa checkout. (6) Mag-log in o gumawa ng account kung wala ka pa. (7) Mag-bayad gamit ang Maya, Visa, GCash, o Bank Transfer. (8) Padadalhan ka ng digital ticket na may QR code sa email mo, at makikita mo rin ito sa 'My Tickets' sa account dashboard mo."
    category: "tagalog"

  - question: "Paano mag-sign up? Paano gumawa ng account?"
    answer: "Para gumawa ng Veent Tix account: (1) I-click ang 'LOGIN' button sa kanang taas ng navigation bar sa kahit anong page. (2) Sa sign-in page (v2.veent.io/sign-in), i-click ang 'Sign up' link. (3) I-fill up ang full name, email address, at iba pang required details. (4) Tingnan ang email mo para sa verification link at i-confirm ang account mo. Pagka-verified na, pwede ka nang mag-log in, mag-browse ng events, bumili ng tickets, at i-manage ang dashboard mo."
    category: "tagalog"

  - question: "Paano mag-log in?"
    answer: "I-click lang ang 'LOGIN' button sa kanang taas ng navigation bar — makikita mo ito sa lahat ng pages ng website. Dadalhin ka sa sign-in page sa v2.veent.io/sign-in. Pwede kang mag-sign in gamit ang 'Continue with Google' o mag-enter ng email at password mo. Pagka-sign in, ma-access mo na ang Dashboard at Wallet mo."
    category: "tagalog"

  - question: "Saan makikita ang mga events?"
    answer: "Maraming paraan para mahanap ang mga events: (1) I-click ang 'Explore Events' sa navigation bar sa taas ng kahit anong page — dadalhin ka sa Discover page sa www.veent.io/discover kung saan naka-list lahat ng upcoming events by date. (2) Sa homepage (www.veent.io), mag-scroll pababa sa 'Recommended Events' section para makita ang mga featured events. I-click ang 'Explore for more' para makita lahat. (3) I-click ang kahit anong event card para makita ang full details, ticket options, at pricing."
    category: "tagalog"

  - question: "Paano mag-bayad? Ano ang payment methods?"
    answer: "Pagka-select mo ng tickets at na-click mo na ang 'Next,' pupunta ka sa checkout. Pwede kang pumili sa mga sumusunod na payment methods: (1) Maya — digital wallet, (2) Visa — credit o debit card, (3) GCash — mobile wallet, o (4) Bank Transfer — direct bank payment. Lahat ng payments ay secure at processed sa mga trusted payment partners. Pagka-confirm ng payment, padadalhan ka ng digital ticket na may QR code sa email mo."
    category: "tagalog"

  - question: "May refund ba? Pwede ba mag-refund?"
    answer: "Ang lahat ng purchases sa Veent Tix ay final at non-refundable. Strict ang No Refund Policy namin — pagka-bili mo na ng ticket, hindi na pwede mag-refund, mag-cancel, o mag-exchange sa kahit anong dahilan, kasama na ang change of schedule, sakit, transportation issues, o hindi ka satisfied sa event. Pero kung ang event mismo ang na-cancel ng organizer, ang organizer ang bahala sa refund ayon sa sarili nilang refund policy. Ang Veent Tix ay hindi responsible sa refund processing maliban kung explicitly stated."
    category: "tagalog"

  - question: "Paano makita ang tickets ko?"
    answer: "Para makita ang mga nabili mong tickets: (1) I-click ang 'LOGIN' sa kanang taas ng navigation bar at mag-sign in sa v2.veent.io/sign-in. (2) Pagka-log in, pumunta sa Dashboard mo. (3) I-click ang 'My Tickets' para makita lahat ng tickets mo kasama ang QR codes. Pwede mong i-show ang QR code sa phone mo sa event entrance, o mag-print ng copy. Naka-send din ang tickets sa email mo pagka-purchase."
    category: "tagalog"

  - question: "Saan ang login button?"
    answer: "Ang 'LOGIN' button ay nasa kanang taas ng navigation bar. Makikita mo ito sa lahat ng pages ng website — hindi siya nawawala. I-click mo lang at dadalhin ka sa v2.veent.io/sign-in kung saan pwede kang mag-sign in gamit ang Google o email at password, o mag-sign up para sa bagong account."
    category: "tagalog"

  - question: "Paano pumili ng seat?"
    answer: "Hindi lahat ng events ay may seat selection — depende ito sa ticket type. Para pumili ng seat: (1) Pumunta sa event page sa pamamagitan ng Discover page (www.veent.io/discover) at i-click ang event. (2) Mag-scroll pababa sa 'Book Your Ticket Now.' (3) Sa mga ticket types na may seat selection (tulad ng VVIP o VIP), may makikita kang 'Select Seats' button. I-click ito para lumabas ang seat map. (4) Piliin ang gusto mong seats sa mga available. (5) I-click ang 'Next' para mag-proceed sa checkout. Sa general admission tickets, walang seat selection — gamitin lang ang + at - buttons para pumili ng quantity."
    category: "tagalog"

  - question: "Paano i-contact ang support?"
    answer: "Maraming paraan para mag-contact sa Veent Tix: (1) Mag-email sa support@veenttix.com — isama ang full name, registered email, at ticket order ID mo (kung meron) para mas mabilis ang tulong. (2) I-click ang 'Contacts' sa navigation bar o pumunta sa www.veent.io/contacts para sa contact form (para sa event organizers). (3) Para sa general inquiries, mag-email sa hello@veent.io. Available ang support team Monday to Saturday, 9:00 AM to 6:00 PM (Philippine Time), at nag-re-respond within 24 to 48 hours."
    category: "tagalog"

  - question: "Pwede ba GCash? Ano ang GCash?"
    answer: "Oo, tinatanggap ang GCash sa Veent Tix! Ang GCash ay isang mobile wallet — pwede mong gamitin ito para mag-bayad ng tickets sa checkout. Bukod sa GCash, tinatanggap din ang Maya, Visa (credit/debit card), at Bank Transfer. Lahat ng payments ay processed nang secure sa mga trusted payment partners."
    category: "tagalog"

  - question: "Paano mag-share ng event?"
    answer: "Para mag-share ng event sa kaibigan o sa social media: (1) Pumunta sa event page sa pamamagitan ng Discover page at i-click ang event. (2) Hanapin ang 'Share Event' button sa event page. (3) I-click ito para i-share ang event sa iba't ibang social media platforms. Pwede mo ring i-copy ang URL ng event page mula sa address bar ng browser mo at i-send sa mga kaibigan mo."
    category: "tagalog"

  - question: "Safe ba mag-bayad dito?"
    answer: "Oo, very secure ang payment system ng Veent Tix. Gumagamit kami ng enterprise-grade security na may industry-leading encryption para protektahan ang payment data mo. Kasama sa mga security measures namin ang SSL encryption, firewalls, secure cloud hosting, role-based access controls, at regular system updates at audits. Lahat ng payments ay processed sa mga trusted payment partners tulad ng Maya, Visa, GCash, at Bank Transfer."
    category: "tagalog"

  - question: "Ano mangyayari pag na-cancel ang event?"
    answer: "Kung fully na-cancel ang isang event, ang event organizer ang responsible sa pag-handle ng refund requests o alternative solutions, tulad ng event credits o rescheduled access. Kung postponed o rescheduled lang, valid pa rin ang existing ticket mo para sa bagong date o venue — padadalhan ka ng Veent Tix ng email notification kapag na-finalize na ng organizer ang updated details. Tandaan: ang Veent Tix ay ticketing service provider lang at hindi nagko-control ng event decisions o refund timelines."
    category: "tagalog"

  - question: "Paano bumalik sa homepage?"
    answer: "I-click lang ang Veent logo sa kaliwang taas ng navigation bar — makikita mo ito sa lahat ng pages ng website. Dadalhin ka nito pabalik sa homepage sa www.veent.io."
    category: "tagalog"

  - question: "Saan ang privacy policy?"
    answer: "Para makita ang Privacy Policy, mag-scroll pababa sa pinaka-ilalim ng kahit anong page sa www.veent.io at hanapin sa footer. I-click ang 'Privacy Policy' — dadalhin ka sa www.veent.io/data-privacy. Nandoon ang buong Data & Privacy Policy na may 7 sections tungkol sa data collection, paggamit, sharing, storage, mga karapatan mo, security measures, at policy updates."
    category: "tagalog"

  - question: "Paano mag-contact sa organizer?"
    answer: "Para ma-contact ang event organizer, pumunta sa specific event page ng event na pinag-uusapan. Mag-scroll pababa lagpas sa ticket selection area at hanapin ang 'Need Help? Contact Us' section. Dito makikita ang contact information ng organizer, na pwedeng may name, phone number, email address, o social media links. Iba-iba ang contact details ng bawat event organizer."
    category: "tagalog"

  - question: "Kailangan ba ng account para bumili ng ticket?"
    answer: "Oo, kailangan mo ng Veent Tix account para makabili ng tickets. Para gumawa ng account, i-click ang 'LOGIN' button sa kanang taas ng navigation bar, tapos i-click ang 'Sign up' sa sign-in page (v2.veent.io/sign-in). I-fill up ang full name, email, at iba pang required info. Pagka-verify ng account mo, pwede ka nang bumili ng tickets, mag-browse ng events, at i-manage ang dashboard mo."
    category: "tagalog"

  - question: "Ano ang dapat dalhin ko sa event?"
    answer: "Kailangan mong dalhin ang valid copy ng ticket mo — pwedeng printed o digital (QR code) — at i-present ito sa event entrance. Pwede ring kailanganin ng government-issued photo ID (tulad ng driver's license, passport, o national ID) na naka-match sa pangalan sa ticket. Para makita ang digital ticket mo, mag-log in sa Veent Tix account mo at pumunta sa 'My Tickets' sa Dashboard, o i-check ang email na pinadala nung bumili ka."
    category: "tagalog"
