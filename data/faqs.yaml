    category: "navigation"

  - question: "I want to host an event on Veent Tix"
    answer: "To host an event on Veent Tix: (1) Click 'Create Event' on the homepage or click 'Contacts' in the top navigation bar. (2) Fill out the contact form at www.veent.io/contacts with your name, email, company name, event type, and details about your event. (3) The Veent Tix team will reach out to discuss next steps. You'll then be able to set up your event listing, ticket tiers, pricing, and use marketing tools through the organizer dashboard."
    category: "navigation"

