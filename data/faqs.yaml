    answer: "There are several ways: (1) Click 'Contacts' in the top navigation bar to go to the contact form at www.veent.io/contacts (this is primarily for event organizers). (2) Scroll to the bottom of any page and find 'Contact Us' in the footer Quick Links. (3) For support issues, email support@veenttix.com directly. (4) For general inquiries, email hello@veent.io. You can also find social media links in the footer: Facebook, Instagram, LinkedIn, and TikTok."
    category: "navigation"

